replicaCount: 1

env: ""
appUrl: ""

# Comma-separated CIDR ranges allowed to access the admin area (/admin and
# admin tRPC procedures). Empty = no network restriction.
# UZH networks: 130.60.0.0/16 (institutes/servers), 89.206.64.0/18 (WLAN/VPN).
adminAllowedIpRanges: ""

azureAd:
  clientId: ""
  clientSecret: ""
  tenantId: ""

image:
  repository: ghcr.io/uzh-bf/thesis-platform
  tag: dev
  runtime: node-runner
  pullPolicy: Always

service:
  type: ClusterIP
  port: 3000

secretName: ""

ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: k8s-crt-mgr-iss-stg-apps-default
  hosts:
    - host: theses.stg.df-app.ch
      paths:
        - /
  tls:
    - secretName: thesis-platform-tls
      hosts:
        - theses.stg.df-app.ch

resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    memory: 256Mi
    cpu: 200m

migration:
  image:
    repository: ""
    tag: ""
    pullPolicy: ""
  resources:
    requests:
      memory: 256Mi
      cpu: 200m
    limits:
      memory: 1024Mi
      cpu: 1000m

annotations: {}
podAnnotations: {}

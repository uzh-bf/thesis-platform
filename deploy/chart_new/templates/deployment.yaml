apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "thesis-platform.fullname" . }}
  labels:
    {{- include "thesis-platform.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "thesis-platform.selectorLabels" . | nindent 6 }}
  template:
    metadata:
    {{- with merge .Values.podAnnotations .Values.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
        timestamp: {{ now | quote }}
    {{- end }}
      labels:
        {{- include "thesis-platform.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- if or .Values.appUrl .Values.env .Values.stagingSafety.grantAllAdmins .Values.azureAd.clientId .Values.azureAd.tenantId }}
          env:
            {{- if .Values.env }}
            - name: THESIS_PLATFORM_ENV
              value: {{ .Values.env | quote }}
            {{- end }}
            {{- if .Values.appUrl }}
            - name: NEXTAUTH_URL
              value: {{ .Values.appUrl | quote }}
            {{- end }}
            {{- if .Values.stagingSafety.grantAllAdmins }}
            - name: STAGING_GRANT_ALL_ADMINS
              value: {{ .Values.stagingSafety.grantAllAdmins | quote }}
            {{- end }}
            {{- if .Values.azureAd.clientId }}
            - name: AZURE_AD_CLIENT_ID
              value: {{ .Values.azureAd.clientId | quote }}
            {{- end }}
            {{- if .Values.azureAd.tenantId }}
            - name: AZURE_AD_TENANT_ID
              value: {{ .Values.azureAd.tenantId | quote }}
            - name: NEXT_PUBLIC_AZURE_AD_TENANT_ID
              value: {{ .Values.azureAd.tenantId | quote }}
            {{- end }}
          {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "thesis-platform.secretName" . }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

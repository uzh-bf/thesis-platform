{{- if and (eq (default "node" .Values.image.runtime) "distroless") (not .Values.migration.image.tag) }}
{{- fail "migration.image.tag is required when image.runtime is distroless" }}
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "thesis-platform.fullname" . }}-migrate
  labels:
    {{- include "thesis-platform.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: {{ include "thesis-platform.fullname" . }}-migrate
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      containers:
        - name: migrate
          image: "{{ .Values.migration.image.repository | default .Values.image.repository }}:{{ .Values.migration.image.tag | default (.Values.image.tag | default .Chart.AppVersion) }}"
          imagePullPolicy: {{ .Values.migration.image.pullPolicy | default .Values.image.pullPolicy }}
          {{- if not .Values.migration.image.tag }}
          command: ['prisma', 'migrate', 'deploy']
          {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "thesis-platform.secretName" . }}
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}

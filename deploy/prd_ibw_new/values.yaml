image:
  repository: ghcr.io/uzh-bf/thesis-platform-ibw
  tag: 'stable-arm-fcbc08c5bb80d4e4eb8aebdfe9d4a30d40591d04'

env: prd_ibw
appUrl: 'https://theses.business.uzh.ch'

# Admin area is only reachable from the UZH network / VPN
adminAllowedIpRanges: '130.60.0.0/16'

azureAd:
  clientId: ''
  clientSecret: ''
  tenantId: ''

secretName: prd-thesisplatform-ibw-secrets

ingress:
  annotations:
    cert-manager.io/cluster-issuer: k8s-crt-mgr-iss-prd-apps-default
  hosts:
    - host: theses.business.prd.df-app.ch
      paths:
        - /
    - host: theses.business.uzh.ch
      paths:
        - /
  tls:
    - secretName: thesis-platform-ibw-prod-tls
      hosts:
        - theses.business.prd.df-app.ch
        - theses.business.uzh.ch

name: Sync dev with main

on:
  push:
    branches:
      - main

jobs:
  sync-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fast-forward dev to main
        run: |
          git checkout dev
          git merge --ff-only origin/main
          git push origin dev

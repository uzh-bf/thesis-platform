name: Build Docker image

on:
  push:
    branches:
      - 'main'
  workflow_dispatch:
    inputs:
      target_tag:
        description: Optional tag to add without rebuilding (defaults to v<package.json version>)
        required: false

env:
  REGISTRY: ghcr.io

jobs:
  build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=main

      - name: Replace .env.production with .env.stage
        shell: bash
        run: |
          rm .env.production
          mv .env.stage .env.production
        if: github.ref == 'refs/heads/main'

      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_VERSION=${{ github.ref_name }}
          
  build-ibw:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-ibw
          tags: |
            type=raw,value=main

      - name: Build and push Docker image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_URL=theses.business.uzh.ch
            NEXT_PUBLIC_FORMS_URL_PUBLISH=https://forms.office.com/Pages/ResponsePage.aspx?id=2zjkx2LkIkypCsNYsWmAswMW9Ql8fXxAnGa_PK_OI41UQ1AyT1pNRFVRV1FGQ1NDVTJORERFMlZXNCQlQCN0PWcu
            NEXT_PUBLIC_FORMS_URL_SUBMIT=https://forms.office.com/Pages/ResponsePage.aspx?id=2zjkx2LkIkypCsNYsWmAswMW9Ql8fXxAnGa_PK_OI41UMlpJRDYxUjdBRk5WVk05N0JZNFNLRlNHNiQlQCN0PWcu
            NEXT_PUBLIC_BLOBSERVICECLIENT_URL=https://thesisplatformbusiness.blob.core.windows.net/uploads?
            NEXT_PUBLIC_CONTAINER_NAME=uploads
            NEXT_PUBLIC_AZURE_STORAGE_ACCOUNT_NAME=thesisplatformbusiness
            NEXT_PUBLIC_FOOTER_COPYRIGHT=Department of Business Administration, University of Zurich. All rights reserved.
            NEXT_PUBLIC_DEPARTMENT_NAME=IBW
            NEXT_PUBLIC_DEPARTMENT_LONG_NAME=Department of Business Administration
            NEXT_PUBLIC_FAQ_URL_STUDENT=https://www.business.uzh.ch/en/teaching/theses/faqs.html
            NEXT_PUBLIC_FAQ_URL_SUPERVISOR=https://www.business.uzh.ch/de/Intranet/Lehre/businessthesesmarket.html
            NEXT_PUBLIC_APP_VERSION=${{ github.ref_name }}

  retag-main-image:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve target tag
        id: resolve_tag
        shell: bash
        run: |
          INPUT_TARGET_TAG="${{ github.event.inputs.target_tag }}"
          if [ -n "$INPUT_TARGET_TAG" ]; then
            TARGET_TAG="$INPUT_TARGET_TAG"
          else
            PACKAGE_VERSION="$(jq -r '.version' package.json)"
            if [ -z "$PACKAGE_VERSION" ] || [ "$PACKAGE_VERSION" = "null" ]; then
              echo "Could not read package.json version"
              exit 1
            fi

            if [[ "$PACKAGE_VERSION" == v* ]]; then
              TARGET_TAG="$PACKAGE_VERSION"
            else
              TARGET_TAG="v$PACKAGE_VERSION"
            fi
          fi

          if [ "$TARGET_TAG" = "main" ]; then
            echo "target_tag must differ from source tag main"
            exit 1
          fi

          echo "target_tag=$TARGET_TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved target tag: $TARGET_TAG"

      - name: Add tag to latest main image (no rebuild)
        shell: bash
        run: |
          SOURCE_IMAGE="${{ env.REGISTRY }}/${{ github.repository }}:main"
          TARGET_IMAGE="${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.resolve_tag.outputs.target_tag }}"

          docker buildx imagetools inspect "${SOURCE_IMAGE}" >/dev/null
          docker buildx imagetools create --tag "${TARGET_IMAGE}" "${SOURCE_IMAGE}"
          echo "Promoted ${SOURCE_IMAGE} -> ${TARGET_IMAGE} without rebuilding"

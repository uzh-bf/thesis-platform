name: Deploy production ARM images

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to deploy, for example v1.17.0
        required: true
        type: string

env:
  REGISTRY: ghcr.io

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="$RELEASE_TAG"

          if [[ ! "$TAG" =~ ^v[0-9A-Za-z._-]+$ ]]; then
            echo "Invalid release tag: $TAG" >&2
            exit 1
          fi

          git fetch --force --tags origin
          if ! git rev-parse --verify --quiet "refs/tags/${TAG}^{commit}" >/dev/null; then
            echo "Release tag does not exist: $TAG" >&2
            exit 1
          fi

          SHA="$(git rev-parse "refs/tags/${TAG}^{commit}")"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Log into registry ghcr.io
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify immutable production images
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${{ env.REGISTRY }}/${{ github.repository }}:stable-arm-${{ steps.release.outputs.sha }}" >/dev/null
          docker buildx imagetools inspect "${{ env.REGISTRY }}/${{ github.repository }}-ibw:stable-arm-${{ steps.release.outputs.sha }}" >/dev/null

      - name: Update production image tags
        env:
          PRODUCTION_IMAGE_TAG: stable-arm-${{ steps.release.outputs.sha }}
          PRODUCTION_IBW_IMAGE_TAG: stable-arm-${{ steps.release.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B main origin/main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          perl -0pi -e 's/tag: '\''(?:latest|stable)-arm(?:-[0-9a-f]+)?'\''/tag: '\''$ENV{PRODUCTION_IMAGE_TAG}'\''/' deploy/prd_new/values.yaml
          perl -0pi -e 's/image:\n(?:  repository: [^\n]+\n)?  tag: '\''[^'\'']+'\''/image:\n  repository: ghcr.io\/uzh-bf\/thesis-platform-ibw\n  tag: '\''$ENV{PRODUCTION_IBW_IMAGE_TAG}'\''/' deploy/prd_ibw_new/values.yaml

          git add deploy/prd_new/values.yaml deploy/prd_ibw_new/values.yaml
          if git diff --cached --quiet; then
            echo "Production already uses images from ${{ steps.release.outputs.tag }}."
            exit 0
          fi

          git commit -m "chore(deploy): update production image tags [skip ci]"
          git push origin HEAD:main

name: Build production ARM Docker images

on:
  push:
    branches:
      - 'main'
    paths-ignore:
      - 'deploy/stg_new/values.yaml'
      - 'deploy/prd_new/values.yaml'
      - 'deploy/prd_ibw_new/values.yaml'

env:
  REGISTRY: ghcr.io

concurrency:
  group: release-production
  cancel-in-progress: false

jobs:
  build-prd-arm:
    if: github.event_name == 'push' && startsWith(github.event.head_commit.message, 'chore(release)')
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
        with:
          fetch-depth: 0

      - name: Resolve release tag and commit hash
        id: release
        shell: bash
        run: |
          TAG=$(git tag --points-at HEAD | grep '^v' | head -1)
          if [[ -z "$TAG" ]]; then
            echo "Release push did not have a v* tag on HEAD." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.release.outputs.tag }}-arm
            type=raw,value=stable-arm
            type=raw,value=stable-arm-${{ steps.release.outputs.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_URL=theses.df.uzh.ch
            NEXT_PUBLIC_FORMS_URL_PUBLISH=https://forms.office.com/Pages/ResponsePage.aspx?id=2zjkx2LkIkypCsNYsWmAs9iU1p12TNBNlqpakIPkkQVUOVpKSFRLRksxVUlSWUNXMjNJVlYzNFoxTyQlQCN0PWcu
            NEXT_PUBLIC_FORMS_URL_SUBMIT=https://forms.office.com/Pages/ResponsePage.aspx?id=2zjkx2LkIkypCsNYsWmAs_TeTD3rkXtGpbExdNgeYCZUNkpHOVo4MlREUTJPNE9LV0lVUEVSOElJVC4u&embed=true
            NEXT_PUBLIC_BLOBSERVICECLIENT_URL=https://prdthesisplatformff7fo.blob.core.windows.net/uploads?
            NEXT_PUBLIC_CONTAINER_NAME=uploads
            NEXT_PUBLIC_AZURE_STORAGE_ACCOUNT_NAME=prdthesisplatformff7fo
            NEXT_PUBLIC_FOOTER_COPYRIGHT=Department of Finance, University of Zurich. All rights reserved.
            NEXT_PUBLIC_DEPARTMENT_NAME=DF
            NEXT_PUBLIC_DEPARTMENT_LONG_NAME=Department of Finance
            NEXT_PUBLIC_FAQ_URL_STUDENT=https://www.df.uzh.ch/en/studies/bachelor-master/thesis/faq.html
            NEXT_PUBLIC_FAQ_URL_SUPERVISOR=https://www.df.uzh.ch/de/intranet/phd/thesis-supervision.html
            NEXT_PUBLIC_APP_VERSION=stable-arm-${{ steps.release.outputs.sha }}
            ENABLE_DF_WEBSTATS=true

      - name: Build and push migration image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: Dockerfile
          target: migration-runner
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:migration-${{ steps.release.outputs.tag }}-arm
            ${{ env.REGISTRY }}/${{ github.repository }}:migration-stable-arm
            ${{ env.REGISTRY }}/${{ github.repository }}:migration-stable-arm-${{ steps.release.outputs.sha }}
          labels: ${{ steps.meta.outputs.labels }}

  build-prd-ibw-arm:
    if: github.event_name == 'push' && startsWith(github.event.head_commit.message, 'chore(release)')
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
        with:
          fetch-depth: 0

      - name: Resolve release tag and commit hash
        id: release
        shell: bash
        run: |
          TAG=$(git tag --points-at HEAD | grep '^v' | head -1)
          if [[ -z "$TAG" ]]; then
            echo "Release push did not have a v* tag on HEAD." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-ibw
          tags: |
            type=raw,value=${{ steps.release.outputs.tag }}-arm
            type=raw,value=stable-arm
            type=raw,value=stable-arm-${{ steps.release.outputs.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: Dockerfile
          target: node-runner
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_URL=theses.business.uzh.ch
            NEXT_PUBLIC_FORMS_URL_PUBLISH=https://forms.office.com/Pages/ResponsePage.aspx?id=2zjkx2LkIkypCsNYsWmAswMW9Ql8fXxAnGa_PK_OI41UQ1AyT1pNRFVRV1FGQ1NDVTJORERFMlZXNCQlQCN0PWcu
            NEXT_PUBLIC_FORMS_URL_SUBMIT=https://forms.office.com/Pages/ResponsePage.aspx?id=2zjkx2LkIkypCsNYsWmAswMW9Ql8fXxAnGa_PK_OI41UMlpJRDYxUjdBRk5WVk05N0JZNFNLRlNHNiQlQCN0PWcu
            NEXT_PUBLIC_BLOBSERVICECLIENT_URL=https://prdthesisplatformbz89yx5.blob.core.windows.net/uploads?
            NEXT_PUBLIC_CONTAINER_NAME=uploads
            NEXT_PUBLIC_AZURE_STORAGE_ACCOUNT_NAME=prdthesisplatformbz89yx5
            NEXT_PUBLIC_FOOTER_COPYRIGHT=Department of Business Administration, University of Zurich. All rights reserved.
            NEXT_PUBLIC_DEPARTMENT_NAME=IBW
            NEXT_PUBLIC_DEPARTMENT_LONG_NAME=Department of Business Administration
            NEXT_PUBLIC_FAQ_URL_STUDENT=https://www.business.uzh.ch/en/teaching/theses/faqs.html
            NEXT_PUBLIC_FAQ_URL_SUPERVISOR=https://www.business.uzh.ch/de/Intranet/Lehre/businessthesesmarket.html
            NEXT_PUBLIC_APP_VERSION=stable-arm-${{ steps.release.outputs.sha }}

  deploy-production:
    if: github.event_name == 'push' && startsWith(github.event.head_commit.message, 'chore(release)')
    needs:
      - build-prd-arm
      - build-prd-ibw-arm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout current main
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
        with:
          fetch-depth: 0
          token: ${{ secrets.DEPLOY_PUSH_TOKEN }}

      - name: Update production image tags
        env:
          PRODUCTION_IMAGE_TAG: stable-arm-${{ github.sha }}
          PRODUCTION_MIGRATION_IMAGE_TAG: migration-stable-arm-${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout -B main origin/main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          perl -0pi -e 's/tag: '\''stable-arm(?:-[0-9a-f]+)?'\''/tag: '\''$ENV{PRODUCTION_IMAGE_TAG}'\''/' deploy/prd_new/values.yaml
          perl -0pi -e 's/(image:\n(?:  repository: [^\n]+\n)?  tag: '\''[^'\'']+'\''\n)(?:  runtime: [^\n]+\n)?/${1}  runtime: distroless\n/' deploy/prd_new/values.yaml
          grep -q "runtime: distroless" deploy/prd_new/values.yaml
          if grep -q "tag: 'migration-" deploy/prd_new/values.yaml; then
            perl -0pi -e 's/(migration:\n  image:\n(?:    repository: [^\n]+\n)?    tag: )'\''[^'\'']+'\''/${1}'\''$ENV{PRODUCTION_MIGRATION_IMAGE_TAG}'\''/' deploy/prd_new/values.yaml
            grep -q "tag: '${PRODUCTION_MIGRATION_IMAGE_TAG}'" deploy/prd_new/values.yaml
          elif grep -q '^migration:' deploy/prd_new/values.yaml; then
            perl -0pi -e 's/(migration:\n)/${1}  image:\n    tag: '\''$ENV{PRODUCTION_MIGRATION_IMAGE_TAG}'\''\n/' deploy/prd_new/values.yaml
          else
            printf "\nmigration:\n  image:\n    tag: '%s'\n" "$PRODUCTION_MIGRATION_IMAGE_TAG" >> deploy/prd_new/values.yaml
          fi
          perl -0pi -e 's/tag: '\''stable-arm(?:-[0-9a-f]+)?'\''/tag: '\''$ENV{PRODUCTION_IMAGE_TAG}'\''/' deploy/prd_ibw_new/values.yaml

          git add deploy/prd_new/values.yaml deploy/prd_ibw_new/values.yaml
          if git diff --cached --quiet; then
            echo "Production already uses images from ${{ github.sha }}."
            exit 0
          fi

          git commit -m "chore(deploy): update production image tags [skip ci]"
          git push origin HEAD:main

  publish-github-release:
    if: github.event_name == 'push' && startsWith(github.event.head_commit.message, 'chore(release)')
    needs:
      - build-prd-arm
      - build-prd-ibw-arm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          TAG=$(git tag --points-at HEAD | grep '^v' | head -1)
          if [[ -z "$TAG" ]]; then
            echo "Release push did not have a v* tag on HEAD." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "GitHub Release $RELEASE_TAG already exists."
            exit 0
          fi
          gh release create "$RELEASE_TAG" \
            --target main \
            --generate-notes \
            --title "$RELEASE_TAG"

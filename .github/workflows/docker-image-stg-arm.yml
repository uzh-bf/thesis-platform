name: Build staging ARM Docker image

on:
  push:
    branches:
      - 'main'
    paths-ignore:
      - 'deploy/stg_new/values.yaml'
      - '**/*.md'
      - '.agents/**'
      - '.claude/**'
      - '.vscode/**'
      - 'backups/**'
      - 'bruno/**'
      - 'docs/**'
      - 'project/**'
      - 'solutions/**'
      - 'LICENSE'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

concurrency:
  group: build-staging-arm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-stg-arm:
    if: ${{ github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore(release)') && !startsWith(github.event.head_commit.message, 'chore(deploy)') }}
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=main-arm
            type=raw,value=latest-arm
            type=raw,value=latest-arm-${{ github.sha }}

      - name: Replace .env.production with .env.stg
        shell: bash
        run: |
          rm .env.production
          mv .env.stg .env.production

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_URL=theses.stg.df-app.ch
            NEXT_PUBLIC_FORMS_URL_PUBLISH=''
            NEXT_PUBLIC_FORMS_URL_SUBMIT=https://forms.office.com/Pages/ResponsePage.aspx?id=2zjkx2LkIkypCsNYsWmAs0LFaOQJoXlHrbsK8Pa1si9UQkQ0QUJDREtaM1FOSEZEQllLSUlDQVhRTyQlQCN0PWcu
            NEXT_PUBLIC_BLOBSERVICECLIENT_URL=https://stgthesisplatformbtv7s.blob.core.windows.net/uploads?
            NEXT_PUBLIC_CONTAINER_NAME=uploads
            NEXT_PUBLIC_AZURE_STORAGE_ACCOUNT_NAME=stgthesisplatformbtv7s
            NEXT_PUBLIC_FOOTER_COPYRIGHT=Department of Finance, University of Zurich. All rights reserved.
            NEXT_PUBLIC_DEPARTMENT_NAME=DF
            NEXT_PUBLIC_DEPARTMENT_LONG_NAME=Department of Finance
            NEXT_PUBLIC_FAQ_URL_STUDENT=https://www.df.uzh.ch/en/studies/bachelor-master/thesis/faq.html
            NEXT_PUBLIC_FAQ_URL_SUPERVISOR=https://www.df.uzh.ch/de/intranet/phd/thesis-supervision.html
            NEXT_PUBLIC_APP_VERSION=latest-arm-${{ github.sha }}

      - name: Build and push migration image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: Dockerfile
          target: migration-runner
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:migration-main-arm
            ${{ env.REGISTRY }}/${{ github.repository }}:migration-latest-arm
            ${{ env.REGISTRY }}/${{ github.repository }}:migration-latest-arm-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Restore build-time env file swap
        shell: bash
        run: git restore .env.production .env.stg

      - name: Authenticate deployment push
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
        with:
          fetch-depth: 0
          token: ${{ secrets.DEPLOY_PUSH_TOKEN }}

      - name: Update ArgoCD staging image tag
        if: ${{ github.ref == 'refs/heads/main' }}
        shell: bash
        env:
          STAGING_IMAGE_TAG: latest-arm-${{ github.sha }}
          STAGING_MIGRATION_IMAGE_TAG: migration-latest-arm-${{ github.sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B main origin/main
          perl -0pi -e 's/tag: '\''latest-arm(?:-[0-9a-f]+)?'\''/tag: '\''$ENV{STAGING_IMAGE_TAG}'\''/' deploy/stg_new/values.yaml
          perl -0pi -e 's/(image:\n(?:  repository: [^\n]+\n)?  tag: '\''[^'\'']+'\''\n)(?:  runtime: [^\n]+\n)?/${1}  runtime: distroless\n/' deploy/stg_new/values.yaml
          grep -q "runtime: distroless" deploy/stg_new/values.yaml
          if grep -q "tag: 'migration-" deploy/stg_new/values.yaml; then
            perl -0pi -e 's/(migration:\n  image:\n(?:    repository: [^\n]+\n)?    tag: )'\''[^'\'']+'\''/${1}'\''$ENV{STAGING_MIGRATION_IMAGE_TAG}'\''/' deploy/stg_new/values.yaml
            grep -q "tag: '${STAGING_MIGRATION_IMAGE_TAG}'" deploy/stg_new/values.yaml
          elif grep -q '^migration:' deploy/stg_new/values.yaml; then
            perl -0pi -e 's/(migration:\n)/${1}  image:\n    tag: '\''$ENV{STAGING_MIGRATION_IMAGE_TAG}'\''\n/' deploy/stg_new/values.yaml
          else
            printf "\nmigration:\n  image:\n    tag: '%s'\n" "$STAGING_MIGRATION_IMAGE_TAG" >> deploy/stg_new/values.yaml
          fi
          git add deploy/stg_new/values.yaml
          if git diff --cached --quiet; then
            echo "No ArgoCD image tag change."
            exit 0
          fi
          git commit -m "chore(deploy): update staging image tag [skip ci]"
          git push origin HEAD:main

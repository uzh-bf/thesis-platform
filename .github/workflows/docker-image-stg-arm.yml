name: Build staging ARM Docker image

on:
  push:
    branches:
      - 'main'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-stg-arm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=main-arm
            type=raw,value=latest-arm
            type=raw,value=latest-arm-${{ github.sha }}

      - name: Replace .env.production with .env.stg
        shell: bash
        run: |
          rm .env.production
          mv .env.stg .env.production

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_VERSION=latest-arm-${{ github.sha }}

      - name: Update ArgoCD staging image tag
        if: ${{ github.ref == 'refs/heads/main' }}
        shell: bash
        env:
          STAGING_IMAGE_TAG: latest-arm-${{ github.sha }}
        run: |
          perl -0pi -e 's/tag: '\''latest-arm(?:-[0-9a-f]+)?'\''/tag: '\''$ENV{STAGING_IMAGE_TAG}'\''/' deploy/stg_new/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/stg_new/values.yaml
          if git diff --cached --quiet; then
            echo "No ArgoCD image tag change."
            exit 0
          fi
          git commit -m "chore(deploy): update staging ARM image to ${STAGING_IMAGE_TAG} [skip ci]"
          git push

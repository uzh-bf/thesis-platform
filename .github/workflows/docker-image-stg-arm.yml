name: Build staging ARM Docker image

on:
  push:
    branches:
      - 'main'
    paths-ignore:
      - 'deploy/stg_new/values.yaml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-stg-arm:
    if: ${{ github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'chore(release)') && !startsWith(github.event.head_commit.message, 'chore(deploy)') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=main-arm
            type=raw,value=latest-arm
            type=raw,value=latest-arm-${{ github.sha }}

      - name: Replace .env.production with .env.stg
        shell: bash
        run: |
          rm .env.production
          mv .env.stg .env.production

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_URL=theses.stg.df-app.ch
            NEXT_PUBLIC_FORMS_URL_PUBLISH=''
            NEXT_PUBLIC_FORMS_URL_SUBMIT=https://forms.office.com/Pages/ResponsePage.aspx?id=2zjkx2LkIkypCsNYsWmAs0LFaOQJoXlHrbsK8Pa1si9UQkQ0QUJDREtaM1FOSEZEQllLSUlDQVhRTyQlQCN0PWcu
            NEXT_PUBLIC_BLOBSERVICECLIENT_URL=https://stgthesisplatformbtv7s.blob.core.windows.net/uploads?
            NEXT_PUBLIC_CONTAINER_NAME=uploads
            NEXT_PUBLIC_AZURE_STORAGE_ACCOUNT_NAME=stgthesisplatformbtv7s
            NEXT_PUBLIC_FOOTER_COPYRIGHT=Department of Finance, University of Zurich. All rights reserved.
            NEXT_PUBLIC_DEPARTMENT_NAME=DF
            NEXT_PUBLIC_DEPARTMENT_LONG_NAME=Department of Finance
            NEXT_PUBLIC_FAQ_URL_STUDENT=https://www.df.uzh.ch/en/studies/bachelor-master/thesis/faq.html
            NEXT_PUBLIC_FAQ_URL_SUPERVISOR=https://www.df.uzh.ch/de/intranet/phd/thesis-supervision.html
            NEXT_PUBLIC_APP_VERSION=latest-arm-${{ github.sha }}

      - name: Update ArgoCD staging image tag
        id: argocd-tag
        if: ${{ github.ref == 'refs/heads/main' }}
        shell: bash
        env:
          STAGING_IMAGE_TAG: latest-arm-${{ github.sha }}
        run: |
          UPDATE_BRANCH="chore/update-staging-arm-image"
          perl -0pi -e 's/tag: '\''latest-arm(?:-[0-9a-f]+)?'\''/tag: '\''$ENV{STAGING_IMAGE_TAG}'\''/' deploy/stg_new/values.yaml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/stg_new/values.yaml
          if git diff --cached --quiet; then
            echo "No ArgoCD image tag change."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(deploy): update staging ARM image to ${STAGING_IMAGE_TAG} [skip ci]"
          git fetch origin "${UPDATE_BRANCH}:refs/remotes/origin/${UPDATE_BRANCH}" || true
          git push --force-with-lease origin HEAD:"${UPDATE_BRANCH}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open ArgoCD staging image tag PR
        if: ${{ github.ref == 'refs/heads/main' && steps.argocd-tag.outputs.changed == 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          STAGING_IMAGE_TAG: latest-arm-${{ github.sha }}
        run: |
          UPDATE_BRANCH="chore/update-staging-arm-image"
          OPEN_PR=$(gh pr list --repo "${GITHUB_REPOSITORY}" --head "${UPDATE_BRANCH}" --base main --state open --json number --jq '.[0].number')
          if [[ -n "$OPEN_PR" ]]; then
            echo "PR already exists."
            gh pr edit "$OPEN_PR" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "chore(deploy): update staging ARM image to ${STAGING_IMAGE_TAG}" \
              --body "Updates deploy/stg_new/values.yaml to use ${STAGING_IMAGE_TAG} after the ARM image build completed." \
              --add-reviewer mxmlnwbr
            exit 0
          fi
          gh pr create \
            --repo "${GITHUB_REPOSITORY}" \
            --head "${UPDATE_BRANCH}" \
            --base main \
            --title "chore(deploy): update staging ARM image to ${STAGING_IMAGE_TAG}" \
            --body "Updates deploy/stg_new/values.yaml to use ${STAGING_IMAGE_TAG} after the ARM image build completed." \
            --reviewer mxmlnwbr

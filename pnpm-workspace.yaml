minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  # Reviewed during the Node 24/pnpm 11 upgrade on 2026-07-04.
  - tsx@4.23.0
  - electron-to-chromium@1.5.387
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true
peerDependencyRules:
  allowedVersions:
    # @uzh-bf/design-system@4.1.6 peers FontAwesome 6, but its
    # transpiled source typechecks and builds with the FontAwesome 7 group.
    '@uzh-bf/design-system>@fortawesome/fontawesome-svg-core': '7.3.0'
    '@uzh-bf/design-system>@fortawesome/free-regular-svg-icons': '7.3.0'
    '@uzh-bf/design-system>@fortawesome/free-solid-svg-icons': '7.3.0'
    '@uzh-bf/design-system>@fortawesome/react-fontawesome': '3.3.1'

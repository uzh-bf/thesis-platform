services:
  postgres:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_DB: thesis
      POSTGRES_USER: thesis
      POSTGRES_PASSWORD: thesis
    ports:
      - 15432:5432
    networks:
      - thesis-platform
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U thesis -d thesis']
      interval: 5s
      timeout: 3s
      retries: 20

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.35.0
    command: azurite-blob --blobHost 0.0.0.0 --skipApiVersionCheck
    ports:
      - 11000:10000
    networks:
      - thesis-platform
    volumes:
      - azurite-data:/data

  oidc:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.11
    environment:
      SERVER_PORT: '4011'
      JSON_CONFIG: >-
        {
          "interactiveLogin": false,
          "tokenCallbacks": [
            {
              "issuerId": "default",
              "requestMappings": [
                {
                  "requestParam": "grant_type",
                  "match": "*",
                  "claims": {
                    "sub": "dev-admin",
                    "email": "admin@example.com",
                    "name": "Dev Admin",
                    "email_verified": true
                  }
                }
              ]
            }
          ]
        }
    ports:
      - 4011:4011
    networks:
      - thesis-platform

  next:
    profiles:
      - app
    build: .
    environment:
      NEXTAUTH_SECRET: local-development-secret-change-me
      EMAIL_FROM: theses-signin@bf-app.ch
      EMAIL_SERVER_HOST: sendria
      EMAIL_SERVER_PORT: 1025
      EMAIL_SERVER_USER:
      EMAIL_SERVER_PASSWORD:
      DATABASE_URL: postgresql://thesis:thesis@postgres:5432/thesis?sslmode=disable
    ports:
      - 3000:3000
    networks:
      - thesis-platform
    depends_on:
      postgres:
        condition: service_healthy

  mailhog:
    image: docker.io/mailhog/mailhog:latest
    ports:
      - 1025:1025
      - 8025:8025
    networks:
      - thesis-platform

networks:
  thesis-platform:

volumes:
  postgres-data:
  azurite-data:

services:
  postgres:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_DB: thesis
      POSTGRES_USER: thesis
      POSTGRES_PASSWORD: thesis
    ports:
      - 5432:5432
    networks:
      - thesis-platform
    volumes:
      - postgres-data:/var/lib/postgresql/data

  next:
    profiles:
      - app
    build: .
    environment:
      NEXTAUTH_SECRET: 'abcdabcd'
      EMAIL_FROM: theses-signin@bf-app.ch
      EMAIL_SERVER_HOST: sendria
      EMAIL_SERVER_PORT: 1025
      EMAIL_SERVER_USER:
      EMAIL_SERVER_PASSWORD:
      DATABASE_URL: 'postgresql://thesis:thesis@localhost:5432/thesis'
    ports:
      - 3000:3000
    networks:
      - thesis-platform

  mailhog:
    image: docker.io/mailhog/mailhog:latest
    ports:
      - 1025:1025
      - 8025:8025
    networks:
      - thesis-platform

networks:
  thesis-platform:

volumes:
  postgres-data:
